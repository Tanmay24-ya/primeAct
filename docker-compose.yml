version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=supersecret_crypto_trading_key_for_primetrade
      - JWT_EXPIRES_IN=1h
    volumes:
      - ./backend/prisma:/app/prisma
